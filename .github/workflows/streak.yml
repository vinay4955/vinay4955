name: Generate Analytics Cards

# Renders the GitHub Analytics cards to committed SVGs under profile/:
#   - profile/streak.svg          (streak stats, via the first-party action + our token)
#   - profile/activity-graph.svg  (activity graph, fetched and committed)
# Serving them from our own repo means they always render and never hit the
# shared public-server "Failed to retrieve contributions" error.
# Runs on every push, daily, and on demand — so they always reflect your latest work.
on:
  schedule:
    - cron: "30 3 * * *"     # once a day
  workflow_dispatch:          # manual / on-demand trigger
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@v1.7.0
        with:
          # For PRIVATE contributions to count, create a repo secret named
          # STREAK_TOKEN (a PAT with `repo` scope) and swap the line below to:
          #   token: ${{ secrets.STREAK_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: profile/streak.svg
          options: >-
            user=vinay4955&theme=tokyonight&hide_border=true&border_radius=10

      - name: Fetch activity graph
        run: |
          mkdir -p profile
          url="https://github-readme-activity-graph.vercel.app/graph?username=vinay4955&theme=tokyo-night&hide_border=true&area=true"
          tmp="$(mktemp)"
          # Only overwrite the committed card if we got a real SVG back — a failed
          # or rate-limited fetch keeps the last good graph instead of breaking it.
          if curl -fsS --max-time 30 "$url" -o "$tmp" \
            && head -c 200 "$tmp" | grep -q "<svg" \
            && ! grep -qi "failed to retrieve" "$tmp"; then
            mv "$tmp" profile/activity-graph.svg
            echo "activity graph updated"
          else
            echo "fetch failed or returned an error card — keeping the previous graph"
            rm -f "$tmp"
          fi

      - name: Commit updated cards
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update analytics cards"
          file_pattern: profile/*.svg
